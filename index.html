<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>七翠救奶奶 - 仙侠传说</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 960px;
            max-height: 540px;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* HUD */
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        
        .hud-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .hud-section {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #gold;
            border-radius: 8px;
            padding: 5px 10px;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 14px;
        }
        
        .hp-bar {
            width: 150px;
            height: 12px;
            background: #333;
            border: 1px solid #666;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 3px;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            transition: width 0.3s;
        }
        
        .team-icons {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        
        .team-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid gold;
            overflow: hidden;
        }
        
        .team-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .weapon-level {
            color: #ffd700;
            font-weight: bold;
        }
        
        /* 技能冷却显示 */
        .skills-hud {
            display: flex;
            gap: 10px;
        }
        
        .skill-slot {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #666;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            position: relative;
        }
        
        .skill-slot.ready {
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        
        .skill-key {
            font-size: 10px;
            color: #aaa;
        }
        
        .cooldown-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
        }
        
        /* 屏幕 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a0a2e 0%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .screen.hidden {
            display: none !important;
        }
        
        .game-title {
            font-size: 48px;
            background: linear-gradient(180deg, #ffd700, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }
        
        .game-subtitle {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 30px;
        }
        
        .start-btn {
            padding: 15px 50px;
            font-size: 24px;
            background: linear-gradient(180deg, #ff6600, #cc3300);
            border: 3px solid #ffd700;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
        }
        
        /* 移动端控制 */
        .mobile-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            display: none;
            padding: 0 20px 20px;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }
        }
        
        .d-pad {
            position: relative;
            width: 150px;
            height: 150px;
            pointer-events: auto;
        }
        
        .d-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .d-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }
        
        .d-btn.up { top: 0; left: 50px; }
        .d-btn.down { bottom: 0; left: 50px; }
        .d-btn.left { top: 50px; left: 0; }
        .d-btn.right { top: 50px; right: 0; }
        
        .action-pad {
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }
        
        .action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .action-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 0 rgba(0,0,0,0.5);
        }
        
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.5);
        }
        
        .btn-attack {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            box-shadow: 0 6px 0 #922b21;
        }
        
        .btn-fire {
            background: linear-gradient(145deg, #ff6600, #cc3300);
            box-shadow: 0 6px 0 #992200;
        }
        
        .btn-water {
            background: linear-gradient(145deg, #3498db, #2980b9);
            box-shadow: 0 6px 0 #1a5276;
        }
        
        .btn-combine {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            box-shadow: 0 6px 0 #6c3483;
            width: 80px;
            height: 80px;
        }
        
        .btn-label {
            font-size: 9px;
            margin-top: 2px;
        }
        
        /* 合体动画 */
        .combine-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            color: #ffd700;
            text-shadow: 0 0 30px #ff6600;
            animation: combinePulse 1s ease-out;
            pointer-events: none;
            z-index: 50;
        }
        
        @keyframes combinePulse {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        
        /* 通关动画 */
        .ending-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .ending-animation.hidden {
            display: none;
        }
        
        .saved-text {
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 30px;
            animation: savedPulse 2s ease-in-out infinite;
        }
        
        @keyframes savedPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .grandma-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ffd700;
            background: #f5f5dc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
        }
        
        .happy-text {
            font-size: 24px;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div class="hud" id="hud">
            <div class="hud-left">
                <div class="hud-section">
                    <div>翠翠 HP</div>
                    <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width: 100%"></div></div>
                </div>
                <div class="hud-section">
                    <div class="weapon-level">巨剑 Lv.<span id="weaponLevel">1</span></div>
                    <div>关卡: <span id="stageNum">1</span>/8</div>
                </div>
                <div class="team-icons" id="teamIcons"></div>
            </div>
            <div class="skills-hud">
                <div class="skill-slot ready" id="skillFire">
                    🔥<span class="skill-key">火</span>
                    <div class="cooldown-overlay" id="cdFire" style="height: 0%"></div>
                </div>
                <div class="skill-slot ready" id="skillWater">
                    💧<span class="skill-key">水</span>
                    <div class="cooldown-overlay" id="cdWater" style="height: 0%"></div>
                </div>
            </div>
        </div>
        
        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <div class="d-pad">
                <div class="d-btn up" id="btnUp">▲</div>
                <div class="d-btn down" id="btnDown">▼</div>
                <div class="d-btn left" id="btnLeft">◀</div>
                <div class="d-btn right" id="btnRight">▶</div>
            </div>
            <div class="action-pad">
                <div class="action-row">
                    <div class="action-btn btn-fire" id="btnFire">🔥<span class="btn-label">火</span></div>
                    <div class="action-btn btn-water" id="btnWater">💧<span class="btn-label">水</span></div>
                </div>
                <div class="action-row">
                    <div class="action-btn btn-combine" id="btnCombine">合体<span class="btn-label">2人+</span></div>
                    <div class="action-btn btn-attack" id="btnAttack">⚔️<span class="btn-label">普攻</span></div>
                </div>
            </div>
        </div>
        
        <!-- 开始屏幕 -->
        <div id="startScreen" class="screen">
            <h1 class="game-title">七翠救奶奶</h1>
            <p class="game-subtitle">集齐七色翠翠，合体机甲战神！</p>
            <button class="start-btn" id="startBtn">开始游戏</button>
        </div>
        
        <!-- 关卡完成 -->
        <div id="stageClearScreen" class="screen hidden">
            <h1 class="game-title" style="font-size: 36px;">关卡完成！</h1>
            <p class="game-subtitle" id="newMemberText"></p>
            <button class="start-btn" id="nextStageBtn">下一关</button>
        </div>
        
        <!-- 通关动画 -->
        <div id="endingAnimation" class="ending-animation hidden">
            <div class="saved-text">🎉 成功营救奶奶！ 🎉</div>
            <div class="grandma-avatar">👵</div>
            <div class="happy-text">七个翠翠齐心协力<br>终于打败了二叔二婶！</div>
            <button class="start-btn" style="margin-top: 30px;" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            WIDTH: 960,
            HEIGHT: 540,
            GRAVITY: 0.5,
            JUMP_FORCE: -12,
            MOVE_SPEED: 5,
            TEAM_COLORS: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500'],
            TEAM_NAMES: ['赤翠', '翠翠', '蓝翠', '黄翠', '紫翠', '青翠', '橙翠']
        };
        
        // ==================== 输入管理 ====================
        class InputManager {
            constructor() {
                this.keys = {};
                this.initKeyboard();
                this.initTouch();
            }
            
            initKeyboard() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'z', 'x', 'c', ' '].includes(e.key.toLowerCase())) {
                        e.preventDefault();
                    }
                });
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
            }
            
            initTouch() {
                const bindTouch = (id, key) => {
                    const btn = document.getElementById(id);
                    if (!btn) return;
                    
                    const start = (e) => {
                        e.preventDefault();
                        this.keys[key] = true;
                        btn.style.transform = 'scale(0.95)';
                    };
                    const end = (e) => {
                        e.preventDefault();
                        this.keys[key] = false;
                        btn.style.transform = '';
                    };
                    
                    btn.addEventListener('touchstart', start);
                    btn.addEventListener('touchend', end);
                    btn.addEventListener('mousedown', start);
                    btn.addEventListener('mouseup', end);
                    btn.addEventListener('mouseleave', end);
                };
                
                bindTouch('btnLeft', 'arrowleft');
                bindTouch('btnRight', 'arrowright');
                bindTouch('btnUp', 'arrowup');
                bindTouch('btnDown', 'arrowdown');
                bindTouch('btnAttack', 'z');
                bindTouch('btnFire', 'x');
                bindTouch('btnWater', 'c');
                bindTouch('btnCombine', 'v');
            }
            
            isPressed(key) {
                return !!this.keys[key.toLowerCase()];
            }
        }
        
        // ==================== 实体基类 ====================
        class Entity {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.vx = 0;
                this.vy = 0;
                this.dead = false;
            }
            
            getBounds() {
                return { x: this.x, y: this.y, width: this.width, height: this.height };
            }
            
            intersects(other) {
                const a = this.getBounds();
                const b = other.getBounds();
                return a.x < b.x + b.width && a.x + a.width > b.x &&
                       a.y < b.y + b.height && a.y + a.height > b.y;
            }
        }
        
        // ==================== 玩家（翠翠）====================
        class Player extends Entity {
            constructor(x, y, avatar, color, index) {
                super(x, y, 40, 60);
                this.avatar = avatar;
                this.color = color;
                this.index = index;
                this.name = CONFIG.TEAM_NAMES[index];
                
                this.hp = 100;
                this.maxHp = 100;
                this.onGround = false;
                this.facing = 1;
                this.isCrouching = false;
                
                this.attackCooldown = 0;
                this.skillFireCd = 0;
                this.skillWaterCd = 0;
                
                this.weaponLevel = 1;
                this.isCombined = false;
                this.combineTimer = 0;
            }
            
            update(input, platforms) {
                // 移动
                if (input.isPressed('arrowleft')) {
                    this.vx = -CONFIG.MOVE_SPEED;
                    this.facing = -1;
                } else if (input.isPressed('arrowright')) {
                    this.vx = CONFIG.MOVE_SPEED;
                    this.facing = 1;
                } else {
                    this.vx *= 0.8;
                }
                
                // 下蹲
                this.isCrouching = input.isPressed('arrowdown') && this.onGround;
                if (this.isCrouching) {
                    this.height = 40;
                    this.vx *= 0.5;
                } else {
                    this.height = 60;
                }
                
                // 跳跃
                if (input.isPressed('arrowup') && this.onGround) {
                    this.vy = CONFIG.JUMP_FORCE;
                    this.onGround = false;
                }
                
                // 重力
                this.vy += CONFIG.GRAVITY;
                
                // 应用速度
                this.x += this.vx;
                this.y += this.vy;
                
                // 平台碰撞
                this.onGround = false;
                for (const p of platforms) {
                    if (this.intersects(p)) {
                        if (this.vy > 0 && this.y - this.vy + this.height <= p.y + 5) {
                            this.y = p.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        } else if (this.vy < 0) {
                            this.y = p.y + p.height;
                            this.vy = 0;
                        }
                    }
                }
                
                // 边界
                if (this.x < 0) { this.x = 0; this.vx = 0; }
                if (this.y > CONFIG.HEIGHT) this.dead = true;
                
                // 冷却
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.skillFireCd > 0) this.skillFireCd--;
                if (this.skillWaterCd > 0) this.skillWaterCd--;
                
                // 合体时间
                if (this.combineTimer > 0) {
                    this.combineTimer--;
                    if (this.combineTimer <= 0) {
                        this.isCombined = false;
                    }
                }
            }
            
            attack() {
                if (this.attackCooldown > 0) return null;
                this.attackCooldown = 20;
                
                const damage = this.weaponLevel * (this.isCombined ? 4 : (game.team.length >= 2 ? 2 : 1));
                const range = 80 + this.weaponLevel * 10;
                
                return {
                    x: this.x + (this.facing === 1 ? this.width : -range),
                    y: this.y,
                    width: range,
                    height: this.height,
                    damage: damage,
                    type: 'sword',
                    color: this.color
                };
            }
            
            skillFire() {
                if (this.skillFireCd > 0) return null;
                this.skillFireCd = 120;
                
                const damage = 30 * this.weaponLevel * (this.isCombined ? 4 : (game.team.length >= 2 ? 2 : 1));
                
                return {
                    x: this.x + (this.facing === 1 ? this.width : -100),
                    y: this.y + 10,
                    width: 100,
                    height: 40,
                    damage: damage,
                    type: 'fire',
                    vx: this.facing * 8,
                    vy: 0,
                    life: 60
                };
            }
            
            skillWater() {
                if (this.skillWaterCd > 0) return null;
                this.skillWaterCd = 90;
                
                const damage = 20 * this.weaponLevel * (this.isCombined ? 4 : (game.team.length >= 2 ? 2 : 1));
                
                // 水波向两边扩散
                return [
                    {
                        x: this.x + this.width/2,
                        y: this.y + 20,
                        width: 60,
                        height: 30,
                        damage: damage,
                        type: 'water',
                        vx: 6,
                        vy: 0,
                        life: 40
                    },
                    {
                        x: this.x + this.width/2,
                        y: this.y + 20,
                        width: 60,
                        height: 30,
                        damage: damage,
                        type: 'water',
                        vx: -6,
                        vy: 0,
                        life: 40
                    }
                ];
            }
            
            takeDamage(dmg) {
                if (this.isCombined) dmg = Math.floor(dmg / 2);
                this.hp -= dmg;
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.dead = true;
                }
            }
            
            draw(ctx, cameraX) {
                const sx = this.x - cameraX;
                
                ctx.save();
                
                // 机甲合体效果
                if (this.isCombined && game.team.length >= 7) {
                    // 七色机甲翠
                    const gradient = ctx.createLinearGradient(sx, this.y, sx + this.width, this.y + this.height);
                    CONFIG.TEAM_COLORS.forEach((c, i) => {
                        gradient.addColorStop(i / 6, c);
                    });
                    ctx.fillStyle = gradient;
                    ctx.fillRect(sx - 10, this.y - 10, this.width + 20, this.height + 20);
                    
                    // 机甲细节
                    ctx.fillStyle = '#silver';
                    ctx.fillRect(sx, this.y + 20, this.width, 20);
                } else if (this.isCombined) {
                    // 小合体 - 金色光环
                    ctx.fillStyle = `rgba(255, 215, 0, 0.5)`;
                    ctx.fillRect(sx - 5, this.y - 5, this.width + 10, this.height + 10);
                }
                
                // 身体
                ctx.fillStyle = this.color;
                ctx.fillRect(sx + 10, this.y + 20, 20, 40);
                
                // 头部（翠翠头像）
                if (this.avatar && this.avatar.complete) {
                    ctx.save();
                    ctx.translate(sx + 20, this.y + 15);
                    if (this.facing === -1) ctx.scale(-1, 1);
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(this.avatar, -15, -15, 30, 30);
                    ctx.restore();
                }
                
                // 巨剑
                ctx.fillStyle = `hsl(${this.weaponLevel * 30}, 70%, 50%)`;
                const swordLen = 50 + this.weaponLevel * 5;
                ctx.fillRect(sx + (this.facing === 1 ? 30 : 30 - swordLen), this.y + 25, swordLen, 8);
                
                // 名字
                ctx.fillStyle = '#fff';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, sx + 20, this.y - 10);
                
                ctx.restore();
            }
        }
        
        // ==================== 敌人（二叔二婶）====================
        class Enemy extends Entity {
            constructor(x, y, type, level) {
                super(x, y, 50, 70);
                this.type = type; // 'ershu' or 'ershen'
                this.level = level;
                this.hp = 30 + level * 20;
                this.maxHp = this.hp;
                this.facing = -1;
                this.attackTimer = 0;
                this.moveTimer = 0;
            }
            
            update(player, platforms) {
                this.moveTimer++;
                this.attackTimer++;
                
                const dx = player.x - this.x;
                const dist = Math.abs(dx);
                
                // AI：靠近玩家
                if (dist > 80) {
                    this.vx = dx > 0 ? 2 : -2;
                    this.facing = dx > 0 ? 1 : -1;
                } else {
                    this.vx = 0;
                }
                
                // 重力
                this.vy += CONFIG.GRAVITY;
                
                this.x += this.vx;
                this.y += this.vy;
                
                // 平台碰撞
                for (const p of platforms) {
                    if (this.intersects(p)) {
                        if (this.vy > 0) {
                            this.y = p.y - this.height;
                            this.vy = 0;
                        }
                    }
                }
                
                // 攻击
                if (dist < 100 && this.attackTimer > 60) {
                    this.attackTimer = 0;
                    return { damage: 10 + this.level * 5 };
                }
                
                return null;
            }
            
            takeDamage(dmg) {
                this.hp -= dmg;
                if (this.hp <= 0) {
                    this.dead = true;
                    return true;
                }
                return false;
            }
            
            draw(ctx, cameraX) {
                const sx = this.x - cameraX;
                
                ctx.save();
                
                // 二叔（蓝色调）或二婶（红色调）
                if (this.type === 'ershu') {
                    ctx.fillStyle = '#4169E1';
                } else {
                    ctx.fillStyle = '#DC143C';
                }
                
                // 身体
                ctx.fillRect(sx + 10, this.y + 20, 30, 50);
                
                // 头
                ctx.fillStyle = '#fdbf60';
                ctx.beginPath();
                ctx.arc(sx + 25, this.y + 15, 15, 0, Math.PI * 2);
                ctx.fill();
                
                // 表情（邪恶）
                ctx.fillStyle = '#000';
                ctx.fillRect(sx + 20, this.y + 12, 4, 4);
                ctx.fillRect(sx + 28, this.y + 12, 4, 4);
                ctx.fillRect(sx + 22, this.y + 20, 8, 3);
                
                // 血条
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(sx, this.y - 10, 50, 6);
                ctx.fillStyle = hpPercent > 0.5 ? '#0f0' : '#f00';
                ctx.fillRect(sx, this.y - 10, 50 * hpPercent, 6);
                
                // 标签
                ctx.fillStyle = '#fff';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(this.type === 'ershu' ? '二叔' : '二婶', sx + 25, this.y - 15);
                
                ctx.restore();
            }
        }
        
        // ==================== BOSS（终极二叔二婶）====================
        class Boss extends Enemy {
            constructor(x, y) {
                super(x, y, 'boss', 10);
                this.width = 120;
                this.height = 150;
                this.hp = 2000;
                this.maxHp = this.hp;
                this.phase = 0;
                this.patternTimer = 0;
            }
            
            update(player, platforms) {
                this.patternTimer++;
                
                // 左右移动
                this.x = 800 + Math.sin(this.patternTimer * 0.02) * 200;
                this.y = 250 + Math.sin(this.patternTimer * 0.03) * 50;
                
                // 攻击模式
                if (this.patternTimer % 90 === 0) {
                    return { 
                        damage: 30, 
                        type: 'range',
                        projectiles: [
                            { x: this.x, y: this.y + 75, vx: -5, vy: 0 },
                            { x: this.x, y: this.y + 75, vx: -4, vy: -2 },
                            { x: this.x, y: this.y + 75, vx: -4, vy: 2 }
                        ]
                    };
                }
                
                return null;
            }
            
            draw(ctx, cameraX) {
                const sx = this.x - cameraX;
                
                ctx.save();
                
                // 巨大化二叔二婶合体
                const gradient = ctx.createLinearGradient(sx, this.y, sx + this.width, this.y + this.height);
                gradient.addColorStop(0, '#4169E1');
                gradient.addColorStop(0.5, '#800080');
                gradient.addColorStop(1, '#DC143C');
                ctx.fillStyle = gradient;
                ctx.fillRect(sx, this.y, this.width, this.height);
                
                // 两个头
                ctx.fillStyle = '#fdbf60';
                ctx.beginPath();
                ctx.arc(sx + 30, this.y + 30, 25, 0, Math.PI * 2);
                ctx.arc(sx + 90, this.y + 30, 25, 0, Math.PI * 2);
                ctx.fill();
                
                // BOSS血条
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = '#000';
                ctx.fillRect(sx, this.y - 20, this.width, 15);
                ctx.fillStyle = '#f00';
                ctx.fillRect(sx + 2, this.y - 18, (this.width - 4) * hpPercent, 11);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('究极二叔二婶', sx + this.width/2, this.y - 25);
                
                ctx.restore();
            }
        }
        
        // ==================== 粒子效果 ====================
        class Particle {
            constructor(x, y, color, type) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.type = type;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 30;
                this.size = Math.random() * 5 + 3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life--;
            }
            
            draw(ctx, cameraX) {
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - cameraX, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }
        
        // ==================== 游戏主类 ====================
        class QiCuiGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = CONFIG.WIDTH;
                this.canvas.height = CONFIG.HEIGHT;
                
                this.input = new InputManager();
                this.avatar = new Image();
                this.avatar.src = 'cuicui.jpg';
                
                this.reset();
                this.bindUI();
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            
            resize() {
                const container = document.getElementById('gameContainer');
                const aspect = CONFIG.WIDTH / CONFIG.HEIGHT;
                let w = container.clientWidth;
                let h = container.clientHeight;
                
                if (w / h > aspect) w = h * aspect;
                else h = w / aspect;
                
                this.canvas.style.width = w + 'px';
                this.canvas.style.height = h + 'px';
            }
            
            reset() {
                this.stage = 1;
                this.score = 0;
                this.isRunning = false;
                this.cameraX = 0;
                
                this.team = [];
                this.enemies = [];
                this.attacks = [];
                this.particles = [];
                this.platforms = [];
                this.boss = null;
            }
            
            bindUI() {
                document.getElementById('startBtn').onclick = () => this.start();
                document.getElementById('nextStageBtn').onclick = () => this.nextStage();
            }
            
            start() {
                document.getElementById('startScreen').classList.add('hidden');
                this.team = [];
                this.addTeamMember(); // 第一个翠翠
                this.initStage();
                this.isRunning = true;
                this.loop();
            }
            
            addTeamMember() {
                const index = this.team.length;
                if (index >= 7) return;
                
                const x = 100 + this.team.length * 50;
                const member = new Player(x, 300, this.avatar, CONFIG.TEAM_COLORS[index], index);
                member.weaponLevel = this.stage;
                this.team.push(member);
                
                this.updateTeamIcons();
            }
            
            updateTeamIcons() {
                const container = document.getElementById('teamIcons');
                container.innerHTML = '';
                this.team.forEach((m, i) => {
                    const div = document.createElement('div');
                    div.className = 'team-icon';
                    div.style.borderColor = m.color;
                    div.innerHTML = `<img src="cuicui.jpg" style="filter: hue-rotate(${i * 45}deg)">`;
                    container.appendChild(div);
                });
            }
            
            initStage() {
                this.enemies = [];
                this.attacks = [];
                this.particles = [];
                this.platforms = [];
                this.boss = null;
                this.cameraX = 0;
                
                // 地面
                for (let i = 0; i < 100; i++) {
                    this.platforms.push({
                        x: i * 100,
                        y: CONFIG.HEIGHT - 40,
                        width: 100,
                        height: 40
                    });
                }
                
                // 生成敌人
                const enemyCount = 5 + this.stage * 3;
                for (let i = 0; i < enemyCount; i++) {
                    const x = 800 + i * 300 + Math.random() * 200;
                    const type = Math.random() > 0.5 ? 'ershu' : 'ershen';
                    this.enemies.push(new Enemy(x, 300, type, this.stage));
                }
                
                // BOSS关（第8关）
                if (this.stage === 8) {
                    this.boss = new Boss(1500, 200);
                }
                
                // 重置队友位置
                this.team.forEach((m, i) => {
                    m.x = 100 + i * 50;
                    m.y = 300;
                    m.hp = m.maxHp;
                    m.dead = false;
                });
            }
            
            combine() {
                if (this.team.length < 2) return;
                
                // 检查是否已经有合体的
                const alreadyCombined = this.team.some(m => m.isCombined);
                if (alreadyCombined) {
                    // 解除合体
                    this.team.forEach(m => {
                        m.isCombined = false;
                        m.combineTimer = 0;
                    });
                    return;
                }
                
                // 执行合体
                this.team.forEach(m => {
                    m.isCombined = true;
                    m.combineTimer = 600; // 10秒
                });
                
                // 合体特效
                const main = this.team[0];
                for (let i = 0; i < 30; i++) {
                    this.particles.push(new Particle(main.x + 20, main.y + 30, '#ffd700', 'combine'));
                }
                
                // 显示合体文字
                if (this.team.length >= 7) {
                    this.showEffectText('七色机甲翠！');
                } else {
                    this.showEffectText(`${this.team.length}翠合体！`);
                }
            }
            
            showEffectText(text) {
                const div = document.createElement('div');
                div.className = 'combine-effect';
                div.textContent = text;
                document.getElementById('gameContainer').appendChild(div);
                setTimeout(() => div.remove(), 1000);
            }
            
            update() {
                if (!this.isRunning) return;
                
                const mainPlayer = this.team[0];
                
                // 更新队友
                this.team.forEach((member, i) => {
                    if (member.dead) return;
                    
                    // 主玩家由玩家控制，其他AI跟随
                    if (i === 0) {
                        member.update(this.input, this.platforms);
                    } else {
                        // AI简单跟随
                        const targetX = this.team[i-1].x - 40;
                        member.x += (targetX - member.x) * 0.1;
                        member.y = this.team[i-1].y;
                        member.facing = this.team[i-1].facing;
                    }
                });
                
                // 相机跟随主玩家
                this.cameraX = mainPlayer.x - 200;
                if (this.cameraX < 0) this.cameraX = 0;
                
                // 攻击
                if (this.input.isPressed('z')) {
                    this.team.forEach(m => {
                        if (!m.dead) {
                            const atk = m.attack();
                            if (atk) this.attacks.push(atk);
                        }
                    });
                }
                
                // 火系技能
                if (this.input.isPressed('x')) {
                    this.team.forEach(m => {
                        if (!m.dead) {
                            const skill = m.skillFire();
                            if (skill) this.attacks.push(skill);
                        }
                    });
                }
                
                // 水系技能
                if (this.input.isPressed('c')) {
                    this.team.forEach(m => {
                        if (!m.dead) {
                            const skill = m.skillWater();
                            if (skill) this.attacks.push(...skill);
                        }
                    });
                }
                
                // 合体
                if (this.input.isPressed('v')) {
                    this.combine();
                }
                
                // 更新攻击
                this.attacks.forEach(a => {
                    if (a.vx !== undefined) {
                        a.x += a.vx;
                        a.y += a.vy;
                    }
                    if (a.life !== undefined) {
                        a.life--;
                        if (a.life <= 0) a.dead = true;
                    }
                });
                this.attacks = this.attacks.filter(a => !a.dead);
                
                // 更新敌人
                this.enemies.forEach(e => {
                    const result = e.update(mainPlayer, this.platforms);
                    if (result) {
                        // 敌人攻击玩家
                        this.team.forEach(m => {
                            if (!m.dead && m.intersects({
                                x: e.x - 50,
                                y: e.y,
                                width: 150,
                                height: 70
                            })) {
                                m.takeDamage(result.damage);
                            }
                        });
                    }
                });
                
                // 更新BOSS
                if (this.boss) {
                    const result = this.boss.update(mainPlayer, this.platforms);
                    if (result && result.projectiles) {
                        result.projectiles.forEach(p => {
                            this.attacks.push({
                                x: p.x,
                                y: p.y,
                                width: 20,
                                height: 20,
                                vx: p.vx,
                                vy: p.vy,
                                damage: result.damage,
                                type: 'enemy',
                                life: 100
                            });
                        });
                    }
                }
                
                // 碰撞检测（玩家攻击打敌人）
                this.attacks.forEach(a => {
                    if (a.type === 'enemy') return;
                    
                    this.enemies.forEach(e => {
                        if (a.x < e.x + e.width && a.x + a.width > e.x &&
                            a.y < e.y + e.height && a.y + a.height > e.y) {
                            if (e.takeDamage(a.damage)) {
                                // 击杀敌人
                                this.score += 100;
                                mainPlayer.weaponLevel++;
                                
                                // 击杀特效
                                for (let i = 0; i < 10; i++) {
                                    this.particles.push(new Particle(e.x + 25, e.y + 35, '#ff0000', 'death'));
                                }
                            }
                            a.dead = true;
                        }
                    });
                    
                    // 打BOSS
                    if (this.boss && !a.dead) {
                        if (a.x < this.boss.x + this.boss.width && a.x + a.width > this.boss.x &&
                            a.y < this.boss.y + this.boss.height && a.y + a.height > this.boss.y) {
                            this.boss.hp -= a.damage;
                            a.dead = true;
                            
                            if (this.boss.hp <= 0) {
                                this.boss.dead = true;
                                this.gameClear();
                            }
                        }
                    }
                });
                
                // 敌人攻击打玩家
                this.attacks.forEach(a => {
                    if (a.type !== 'enemy') return;
                    this.team.forEach(m => {
                        if (!m.dead && m.intersects(a)) {
                            m.takeDamage(a.damage);
                            a.dead = true;
                        }
                    });
                });
                
                // 更新粒子
                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => p.life > 0);
                
                // 检查关卡完成
                if (!this.boss && this.enemies.every(e => e.dead)) {
                    if (this.stage < 8) {
                        this.stageClear();
                    }
                }
                
                // 检查玩家全灭
                if (this.team.every(m => m.dead)) {
                    this.gameOver();
                }
                
                // 更新UI
                this.updateUI();
            }
            
            updateUI() {
                const main = this.team[0];
                if (main) {
                    document.getElementById('hpFill').style.width = (main.hp / main.maxHp * 100) + '%';
                    document.getElementById('weaponLevel').textContent = main.weaponLevel;
                }
                document.getElementById('stageNum').textContent = this.stage;
                
                // 技能冷却显示
                if (main) {
                    const fireCd = main.skillFireCd / 120 * 100;
                    document.getElementById('cdFire').style.height = fireCd + '%';
                    document.getElementById('skillFire').classList.toggle('ready', main.skillFireCd <= 0);
                    
                    const waterCd = main.skillWaterCd / 90 * 100;
                    document.getElementById('cdWater').style.height = waterCd + '%';
                    document.getElementById('skillWater').classList.toggle('ready', main.skillWaterCd <= 0);
                }
            }
            
            stageClear() {
                this.isRunning = false;
                if (this.stage < 7) {
                    this.addTeamMember();
                }
                document.getElementById('newMemberText').textContent = 
                    this.stage < 7 ? `${CONFIG.TEAM_NAMES[this.team.length-1]}加入了队伍！` : '准备最终决战！';
                document.getElementById('stageClearScreen').classList.remove('hidden');
            }
            
            nextStage() {
                document.getElementById('stageClearScreen').classList.add('hidden');
                this.stage++;
                this.initStage();
                this.isRunning = true;
                this.loop();
            }
            
            gameClear() {
                this.isRunning = false;
                document.getElementById('endingAnimation').classList.remove('hidden');
            }
            
            gameOver() {
                this.isRunning = false;
                alert('游戏结束！点击确定重新开始');
                location.reload();
            }
            
            draw() {
                // 背景
                const grad = this.ctx.createLinearGradient(0, 0, 0, CONFIG.HEIGHT);
                grad.addColorStop(0, '#87CEEB');
                grad.addColorStop(1, '#98D8C8');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
                
                // 山脉背景
                this.ctx.fillStyle = '#2E8B57';
                for (let i = 0; i < 20; i++) {
                    const x = (i * 150 - this.cameraX * 0.3) % (CONFIG.WIDTH + 300);
                    const h = 100 + Math.sin(i * 0.7) * 50;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x - 50, CONFIG.HEIGHT);
                    this.ctx.lineTo(x + 75, CONFIG.HEIGHT - h);
                    this.ctx.lineTo(x + 200, CONFIG.HEIGHT);
                    this.ctx.fill();
                }
                
                // 地面
                this.ctx.fillStyle = '#8B4513';
                this.platforms.forEach(p => {
                    if (p.x - this.cameraX > -100 && p.x - this.cameraX < CONFIG.WIDTH + 100) {
                        this.ctx.fillRect(p.x - this.cameraX, p.y, p.width, p.height);
                        // 草地
                        this.ctx.fillStyle = '#228B22';
                        this.ctx.fillRect(p.x - this.cameraX, p.y, p.width, 10);
                        this.ctx.fillStyle = '#8B4513';
                    }
                });
                
                // 队友
                this.team.forEach(m => {
                    if (!m.dead) m.draw(this.ctx, this.cameraX);
                });
                
                // 敌人
                this.enemies.forEach(e => {
                    if (!e.dead) e.draw(this.ctx, this.cameraX);
                });
                
                // BOSS
                if (this.boss) {
                    this.boss.draw(this.ctx, this.cameraX);
                }
                
                // 攻击特效
                this.attacks.forEach(a => {
                    if (a.type === 'fire') {
                        this.ctx.fillStyle = '#ff6600';
                        this.ctx.fillRect(a.x - this.cameraX, a.y, a.width, a.height);
                    } else if (a.type === 'water') {
                        this.ctx.fillStyle = '#3498db';
                        this.ctx.fillRect(a.x - this.cameraX, a.y, a.width, a.height);
                    } else if (a.type === 'sword') {
                        this.ctx.fillStyle = a.color;
                        this.ctx.fillRect(a.x - this.cameraX, a.y + 20, a.width, 10);
                    } else if (a.type === 'enemy') {
                        this.ctx.fillStyle = '#800080';
                        this.ctx.beginPath();
                        this.ctx.arc(a.x - this.cameraX + 10, a.y + 10, 10, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                });
                
                // 粒子
                this.particles.forEach(p => p.draw(this.ctx, this.cameraX));
            }
            
            loop() {
                if (!this.isRunning) return;
                
                this.update();
                this.draw();
                
                requestAnimationFrame(() => this.loop());
            }
        }
        
        // 启动游戏
        const game = new QiCuiGame();
    </script>
